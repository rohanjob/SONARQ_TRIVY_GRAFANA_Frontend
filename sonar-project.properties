# =============================================
# SonarQube Configuration - SSP Books Frontend
# =============================================

sonar.projectKey=ssp_books_frontend
sonar.projectName=SSP Books Frontend
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=app
sonar.exclusions=node_modules/**,.next/**,coverage/**,public/**

# JavaScript/JSX
sonar.language=js
sonar.sourceEncoding=UTF-8

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
